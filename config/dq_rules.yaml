rules:
  DUPLICATE_DEDUPED:
    detection: "transactions grouped by transaction_id with row_number > 1"
    handling_action: DEDUPLICATED_KEEP_FIRST
    keep_rule: "earliest parsed transaction_timestamp, then raw_json tie-breaker"

  ORPHANED_ACCOUNT:
    detection: "transaction account_id has no matching Silver account_id"
    handling_action: QUARANTINED
    output: "excluded from Silver transactions and Gold fact_transactions"

  TYPE_MISMATCH:
    detection: "amount value delivered as a quoted JSON string or cannot cast to DECIMAL(18,2)"
    handling_action: CAST_TO_DECIMAL
    output: "castable records retained with dq_flag TYPE_MISMATCH; uncastable required values excluded"

  DATE_FORMAT:
    detection: "date fields not already in YYYY-MM-DD format but parseable as DD/MM/YYYY or Unix epoch"
    handling_action: NORMALISED_DATE
    supported_formats:
      - YYYY-MM-DD
      - DD/MM/YYYY
      - unix_epoch_seconds
      - unix_epoch_milliseconds

  CURRENCY_VARIANT:
    detection: "currency in R, rands, 710, or lowercase zar"
    handling_action: NORMALISED_CURRENCY
    target_value: ZAR

  NULL_REQUIRED:
    detection: "accounts.account_id is null or blank"
    handling_action: EXCLUDED_NULL_PK
    output: "excluded from Silver accounts and all downstream Gold tables"
