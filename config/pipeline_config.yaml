# ============================================================
# Pipeline Configuration
#
# All paths are absolute paths inside the Docker container.
# Do NOT change the /data/input/ or /data/output/ prefixes —
# these are fixed mount points enforced by the scoring system.
#
# The scoring system may inject this file at /data/config/pipeline_config.yaml
# at runtime. Your pipeline should read from that path at startup, not from
# a copy baked into your image.
#
# Recommended loading pattern (Python):
#   import yaml, os
#   config_path = os.environ.get("PIPELINE_CONFIG", "/data/config/pipeline_config.yaml")
#   with open(config_path) as f:
#       config = yaml.safe_load(f)
# ============================================================

# ── Input paths (read-only; do not write here) ────────────────
input:
  accounts_path: /data/input/accounts.csv
  transactions_path: /data/input/transactions.jsonl
  customers_path: /data/input/customers.csv

# ── Output paths (your pipeline creates these at runtime) ────
output:
  bronze_path: /data/output/bronze
  silver_path: /data/output/silver
  gold_path: /data/output/gold
  dq_report_path: /data/output/dq_report.json   # Stage 2+ only

# ── Stage 3 streaming paths ───────────────────────────────────
# Uncomment and use at Stage 3 only.
# streaming:
#   stream_input_path: /data/stream
#   stream_gold_path: /data/output/stream_gold
#   poll_interval_seconds: 10
#   quiesce_timeout_seconds: 60

# ── Spark settings ────────────────────────────────────────────
# Keep master as local[2] to match the 2-vCPU scoring constraint.
# Do not set to local[*] — it will try to use all available CPUs.
spark:
  master: local[2]
  app_name: nedbank-de-pipeline
  parquet_compression: snappy
  # Spark writes temporary files to /tmp. The scoring system provides
  # a 512 MB tmpfs at /tmp — keep intermediate data small.
  # spark.local.dir: /tmp

# ── DQ rules reference ────────────────────────────────────────
# Stage 2+: path to the DQ rules file. Your pipeline must read
# DQ logic from this file rather than hardcoding it.
# dq:
#   rules_path: /data/config/dq_rules.yaml

# Audit-only raw data credibility profile. This output is not part of
# the scorer contract and must not change Gold records or dq_report.json.
credibility:
  rules_path: /data/config/credibility_rules.yaml

# Audit-only timing profile for container lifetime and phase-level runtime.
performance:
  profile_path: /data/output/audit/performance_profile.json

# Runtime mode stays scorer by default for the automated contract. Adaptive
# mode is opt-in for larger local runs that need resumable transaction buckets.
runtime:
  mode: scorer
  adaptive:
    max_bucket_bytes: 268435456
    max_bucket_count: 256
    manifest_path: /data/output/audit/chunk_manifest.json

# Table-aware Delta output sizing. Small dimensions stay compact while
# transaction-scale outputs keep enough parallelism for 2 vCPU execution.
delta:
  output_partitions:
    default: 4
    bronze:
      accounts: 1
      customers: 1
      transactions: 4
    silver:
      accounts: 1
      customers: 1
      transactions: 4
      quarantine_accounts: 1
      quarantine_transactions: 4
    gold:
      dim_accounts: 1
      dim_customers: 1
      fact_transactions: 4
    stream_gold:
      current_balances: 1
      recent_transactions: 4
